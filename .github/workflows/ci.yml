name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies from lockfile
        run: |
          uv python pin 3.11
          uv sync --frozen --all-extras

      - name: Run Ruff
        run: uv run ruff check src tests app scripts

      - name: Run tests
        run: uv run pytest tests -v --tb=short
